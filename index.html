<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tareas Comerciales</title>
<style>
/* ─── DESIGN TOKENS ─── */
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2435;--surface3:#252d40;
  --border:#2a3347;--border2:#3a4560;
  --accent:#4f8ef7;--accent2:#7c6af7;--accent-glow:rgba(79,142,247,.18);
  --green:#22c55e;--red:#f43f5e;--yellow:#f59e0b;--orange:#f97316;--purple:#a855f7;
  --text:#e8ecf5;--text2:#8a95b0;--text3:#505870;
  --radius:10px;--radius2:16px;--radius3:24px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow2:0 8px 40px rgba(0,0,0,.6);
  --font-sans:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --sidebar:220px;
  --priority-urgente:#f43f5e;--priority-alta:#f97316;
  --priority-media:#f59e0b;--priority-baja:#22c55e;
}

@import url('[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap)');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ─── LOCK SCREEN ─── */
#lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;z-index:9999}
#lock-screen .logo{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)}
#lock-screen .logo span{color:var(--accent)}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2);transition:background .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:10px}
.pin-btn{height:56px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--radius);color:var(--text);font-family:var(--font-sans);font-size:20px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
.pin-btn:hover{background:var(--surface3)}
.pin-btn:active{transform:scale(.95)}
.pin-btn.del{font-size:16px}
#pin-error{color:var(--red);font-size:13px;min-height:18px;text-align:center}

/* ─── LAYOUT ─── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden;min-height:0;transition:width .25s cubic-bezier(.4,0,.2,1)}
#sidebar.collapsed{width:60px;overflow:hidden}
#sidebar.collapsed .sidebar-brand .name,
#sidebar.collapsed .sidebar-brand .sub,
#sidebar.collapsed .nav-item span:not(.nav-icon),
#sidebar.collapsed .nav-item .badge,
#sidebar.collapsed .projects-header span,
#sidebar.collapsed .projects-header .btn-icon,
#sidebar.collapsed .project-item .proj-summary-name,
#sidebar.collapsed .project-item span:not(.project-dot):not(.drag-handle),
#sidebar.collapsed .project-item .count{display:none}
#sidebar.collapsed .nav-section{display:none}
#sidebar.collapsed .project-item{justify-content:center;padding:7px 0}
#sidebar.collapsed .project-dot{margin:0}
#sidebar.collapsed .nav-item{justify-content:center;padding:8px 0}
#sidebar.collapsed .nav-icon{width:auto;font-size:18px}
#sidebar.collapsed .sidebar-brand{justify-content:center;padding:14px 0}
#sidebar.collapsed .sidebar-brand .icon{margin:0}
#sidebar.collapsed .projects-header{justify-content:center;padding:10px 0 4px}
#app{transition:none}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* ─── SIDEBAR ─── */
.sidebar-brand{padding:18px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-brand .icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-brand .name{font-weight:700;font-size:15px;letter-spacing:-.3px}
.sidebar-brand .sub{font-size:11px;color:var(--text3)}

.nav-section{padding:10px 8px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius);margin:1px 8px;cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:500;transition:all .15s;position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}

.projects-header{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 4px 12px;flex-shrink:0}
.projects-header span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.btn-icon{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 6px;border-radius:6px;font-size:14px;line-height:1;transition:all .15s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

.project-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;position:relative}
.project-item:hover{background:var(--surface2);color:var(--text)}
.project-item.active{background:var(--accent-glow);color:var(--text)}
.project-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.project-item .count{margin-left:auto;font-size:11px;color:var(--text3)}
.project-item .drag-handle{opacity:0;font-size:12px;color:var(--text3);cursor:grab;margin-right:-2px}
.project-item:hover .drag-handle{opacity:1}

/* ─── TOPBAR ─── */
#search-input{flex:1;max-width:380px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px 7px 34px;color:var(--text);font-family:var(--font-sans);font-size:13.5px;outline:none;transition:border .2s}
#search-input:focus{border-color:var(--accent)}
.search-wrap{position:relative;flex:1;max-width:380px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px 10px;border-radius:var(--radius);font-size:16px;transition:all .15s;display:flex;align-items:center;gap:6px}
.topbar-btn:hover{background:var(--surface2);color:var(--text)}
.notif-badge{position:absolute;top:2px;right:2px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-sans);font-size:13.5px;font-weight:500;transition:all .15s;line-height:1}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3a7de8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,247,.3)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#e02246}
.btn-sm{padding:5px 12px;font-size:12.5px}
.btn-xs{padding:3px 8px;font-size:11.5px}

/* ─── CARDS ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.card-sm{padding:14px}

/* ─── DASHBOARD ─── */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 20px;display:flex;align-items:center;gap:14px;transition:border .2s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.blue{background:rgba(79,142,247,.15);color:var(--accent)}
.stat-icon.red{background:rgba(244,63,94,.15);color:var(--red)}
.stat-icon.green{background:rgba(34,197,94,.15);color:var(--green)}
.stat-icon.yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.stat-val{font-size:28px;font-weight:700;line-height:1}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:2px}

.dash-bottom{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title span{flex:1}

/* ─── BAR CHART ─── */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.bar{width:20px;border-radius:4px 4px 0 0;transition:height .5s cubic-bezier(.34,1.56,.64,1);min-height:2px}
.bar-lbl{font-size:10px;color:var(--text3);text-align:center;line-height:1.2}
.bar-val{font-size:10px;color:var(--text2);text-align:center}

/* ─── TASK LIST ─── */
.task-list{display:flex;flex-direction:column;gap:6px}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;position:relative}
.task-row:hover{border-color:var(--border2);background:var(--surface3)}
.task-row.done-task{opacity:.5}
.task-row .check-btn{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-row .check-btn:hover{border-color:var(--green)}
.task-row .check-btn.checked{background:var(--green);border-color:var(--green);color:#fff}
.task-row .task-body{flex:1;min-width:0}
.task-title{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.task-date{font-size:11.5px;color:var(--text3)}
.task-date.overdue{color:var(--red)}
.task-date.today{color:var(--yellow)}
.task-date.soon{color:var(--orange)}
.priority-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:99px}
.priority-badge.urgente{background:rgba(244,63,94,.15);color:var(--priority-urgente)}
.priority-badge.alta{background:rgba(249,115,22,.15);color:var(--priority-alta)}
.priority-badge.media{background:rgba(245,158,11,.15);color:var(--priority-media)}
.priority-badge.baja{background:rgba(34,197,94,.15);color:var(--priority-baja)}
.project-badge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:99px;background:var(--surface3);color:var(--text2)}
.tag-chip{font-size:10px;padding:1px 7px;border-radius:99px;background:rgba(124,106,247,.15);color:#a78bfa}
.subtask-progress{font-size:11px;color:var(--text3)}
.drag-handle-task{opacity:0;color:var(--text3);cursor:grab;font-size:14px;padding:2px;flex-shrink:0}
.task-row:hover .drag-handle-task{opacity:1}

/* ─── TABS ─── */
.tabs-bar{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;overflow-x:auto}
.tab-btn{padding:9px 16px;border:none;background:none;color:var(--text2);cursor:pointer;font-family:var(--font-sans);font-size:13.5px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn .cnt{font-size:11px;color:var(--text3);margin-left:4px}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:var(--font-sans);font-size:12.5px;font-weight:500;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-sep{flex:1}

/* ─── CALENDAR ─── */
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-header h2{font-size:18px;font-weight:600;flex:1;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-cell{min-height:90px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:border .15s;position:relative}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.other-month .cal-day-num{color:var(--text3)}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.today .cal-day-num{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-task-chip{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-more{font-size:10px;color:var(--text3);margin-top:2px}

/* ─── WEEK VIEW ─── */
.week-header{display:grid;grid-template-columns:50px repeat(7,1fr);gap:3px;margin-bottom:6px}
.week-day-head{text-align:center;padding:8px 4px;background:var(--surface);border-radius:8px;border:1px solid var(--border)}
.week-day-name{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.week-day-num{font-size:18px;font-weight:700;line-height:1}
.week-day-head.today{border-color:var(--accent)}
.week-day-head.today .week-day-num{color:var(--accent)}
.week-body{display:grid;grid-template-columns:50px repeat(7,1fr);gap:3px;overflow-y:auto;max-height:calc(100vh - 220px)}
.week-hour-label{display:flex;align-items:flex-start;padding-top:4px;justify-content:flex-end;padding-right:8px;font-size:10px;color:var(--text3);height:48px}
.week-hour-cell{height:48px;background:var(--surface);border:1px solid var(--border);border-radius:4px;position:relative;cursor:pointer}
.week-hour-cell:hover{background:var(--surface2)}
.week-task-block{position:absolute;left:2px;right:2px;background:var(--accent);border-radius:4px;font-size:10px;padding:2px 4px;overflow:hidden;cursor:pointer;z-index:1}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:max(16px,5vh);overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow2);transform:translateY(20px);transition:transform .2s;margin:0 auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal.modal-sm{max-width:420px}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;padding:2px 6px;border-radius:6px;line-height:1;transition:all .15s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ─── FORMS ─── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12.5px;font-weight:500;color:var(--text2)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--font-sans);font-size:13.5px;outline:none;transition:border .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface2)}
input[type=color]{padding:2px;height:36px;cursor:pointer}

/* ─── SUBTASK LIST ─── */
.subtask-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.subtask-item:last-child{border-bottom:none}
.subtask-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border2);background:none;cursor:pointer;flex
